{extends file='layouts/base.html'}


{block name="content"}
<div class="container">
  <div class="row">
    <div class="col-12 col-md-8 col-lg-6 offset-lg-3 offset-md-2">
      <form class="card mt-5 set-password">
        <div class="card-header">
          <h2 class="card-title">Set Password</h2>
        </div>
        <div class="card-body">
          <div class="form-group mb-3">
            <label for="username" class="form-label d-none">Username/Email/Mobile</label>
            <input type="hidden" class="form-control" id="username" name="username"  value="{$queryParams['username']??''}">
          </div>
          <div class="form-group mb-3">
            <label for="otp" class="form-label d-none">One Time Password</label>
            <input type="text" class="form-control" id="otp" name="otp"  value="{$queryParams['otp']??''}">
          </div>
          <div class="form-group mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" value="Password@123">
              <button class="btn btn-outline-secondary password-toggler" type="button">
                {svg file="password"}
              </button>
            </div>
          </div>
          <div class="form-group mb-3">
            <label for="cpassword" class="form-label">Confirm Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="cpassword" name="cpassword" autocomplete="new-password" value="Password@123">
              <button class="btn btn-outline-secondary password-toggler" type="button">
                {svg file="password"}
              </button>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <div class="d-flex justify-content-end align-items-center">
            <button type="submit" class="btn btn-primary">Set New Password</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

{/block}

{block name="scripts"}
{js file="scripts/guest/set-password.js"}
{/block}
