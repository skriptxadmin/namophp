{extends file='layouts/base.html'}


{block name="content"}
<div class="container">
  <div class="row">
    <div class="col-12 col-md-8 col-lg-6 offset-lg-3 offset-md-2">
      <form class="card mt-5 login">
        <div class="card-header">
          <h2 class="card-title">Welcome Back</h2>
          <p class="card-subtitle">Access your account to continue exploring.</p>
        </div>
        <div class="card-body">
          <div class="form-group mb-3">
            <label for="username" class="form-label">Username/Email/Mobile</label>
            <input type="text" class="form-control" id="username" name="username" autocomplete="username" value="administrator">
          </div>
          <div class="form-group mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" value="Password@123">
              <button class="btn btn-outline-secondary password-toggler" type="button">
                {svg file="password"}
              </button>
            </div>
          </div>
          <a href="{$url}/guest/forgot-password" class="text-black">Forgot Password</a>
        </div>
        <div class="card-footer">
          <div class="d-flex justify-content-end align-items-center">
            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

{/block}

{block name="scripts"}
{js file="scripts/guest/login.js"}
{/block}
